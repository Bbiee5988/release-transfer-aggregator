[project]
name = "release-transfer-aggregator"
authors = ["Release Transfer Team"]
description = "Decentralized release and transfer aggregation smart contract suite"
telemetry = false
requirements = []
[contracts.release-transfer-access]
path = "contracts/release-transfer-access.clar"
depends_on = []

[contracts.release-transfer-core]
path = "contracts/release-transfer-core.clar"
depends_on = []

[contracts.release-transfer-integrity]
path = "contracts/release-transfer-integrity.clar"
depends_on = []

[contracts.release-transfer-metadata]
path = "contracts/release-transfer-metadata.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
